<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      background-color: #050508;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    #metadata-container {
      position: absolute;
      top: 80px; /* Lowered from 40px */
      right: 40px;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: right;
      max-width: 60%;
      /* Multi-layered shadow for maximum contrast against light spots */
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.9)) 
              drop-shadow(0 4px 10px rgba(0,0,0,0.7))
              drop-shadow(0 0 20px rgba(0,0,0,0.4));
      pointer-events: none;
      z-index: 10;
    }
    #video-title {
      font-size: 2.5rem;
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    #video-author {
      font-size: 1.2rem;
      font-weight: 200;
      opacity: 0.9;
      letter-spacing: 0.5px;
    }
    #redirect-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background-color: #ffffff20;
      color: white;
      border: none;
      padding: 10px 15px 12px;
      font-size: 20px;
      border-radius: 5px;
      cursor: pointer;
      backdrop-filter: blur(5px);
      z-index: 10;
    }
    #redirect-button:hover {
      background-color: #ffffff40;
    }
  </style>
</head>
<body>
  <div id="metadata-container">
    <div id="video-title"></div>
    <div id="video-author"></div>
  </div>

  <img src="../assets/zen_garden.jpg" alt="Zen Garden">

  <button id="redirect-button">&rsaquo;</button>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const button = document.getElementById('redirect-button');
      const titleDisplay = document.getElementById('video-title');
      const authorDisplay = document.getElementById('video-author');
      const params = new URLSearchParams(window.location.search);
      let rawParam = params.get('u');
      let targetUrl;

      try {
          if (rawParam) {
              const safeUrl = encodeURI(rawParam.trim());
              const parsedUrl = new URL(safeUrl);
              if (parsedUrl.protocol === 'https:') {
                  targetUrl = parsedUrl.href;
              } else {
                  throw new Error('Insecure protocol');
              }
          }
          if (!targetUrl) throw new Error('No valid URL');
      } catch (err) {
          console.warn('Invalid or insecure URL provided. Redirecting to default.');
          targetUrl = 'https://huggingface.co/';
      }

      if (targetUrl.includes('youtube.com') || targetUrl.includes('youtu.be')) {
          const oEmbedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent(targetUrl)}&format=json`;
          
          fetch(oEmbedUrl)
              .then(res => res.json())
              .then(data => {
                  if (data.title) titleDisplay.innerText = data.title;
                  if (data.author_name) authorDisplay.innerText = data.author_name;
                  if (button && data.title) button.title = `Go to: ${data.title}`;
              })
              .catch(e => console.log('Metadata unavailable'));
      }

      if (button) {
          button.addEventListener('click', function () {
              window.location.href = targetUrl;
          });
          try {
              const urlObj = new URL(targetUrl);
              button.title = button.title || `Go to ${urlObj.hostname}`;
          } catch (e) {
              button.title = targetUrl;
          }
      }

      document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') {
              if (targetUrl) {
                  window.location.href = targetUrl;
              }
          }
      });
    });
  </script>
</body>
</html>
